<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Company Setup | Compass</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<div class="app-shell">

<header class="top-bar">

<a href="../index.html">
<img src="../assets/images/kersog-emblem.svg"
class="emblem"
alt="KERSOG">
</a>

<div>
<h1>Company Setup</h1>
<p>Customize Compass for your company.</p>
</div>

</header>


<section class="page-title">

<h2>Almost Finished</h2>

<p>
Let's configure Compass to match how your company operates.
</p>

</section>


<form class="form-card">

<h3>Company Branding</h3>

<label>Company Name</label>
<input type="text" placeholder="ABC Roofing">

<label>Upload Company Logo</label>

<input type="file">

<label>Website (Optional)</label>
<input type="url" placeholder="https://">

<label>Business Phone</label>
<input type="tel">

<label>Business Email</label>
<input type="email">

<hr>

<h3>Estimate Format</h3>

<label>

<input type="radio" name="estimate" checked>

Xactimate Style

</label>

<br><br>

<label>

<input type="radio" name="estimate">

Symbility Style

</label>

<br><br>

<label>

<input type="radio" name="estimate">

Custom

</label>

<hr>

<h3>Roof Types You Work</h3>

<label><input type="checkbox" checked> Asphalt Shingles</label><br><br>

<label><input type="checkbox"> Metal</label><br><br>

<label><input type="checkbox"> Wood Shake</label><br><br>

<label><input type="checkbox"> Tile</label><br><br>

<label><input type="checkbox"> Flat Roofing</label>

<hr>

<h3>Service Area</h3>

<p>Select every state your company serves.</p>

<select multiple style="height:180px;">

<option>Kansas</option>

<option>Oklahoma</option>

<option>Missouri</option>

<option>Colorado</option>

<option>Nebraska</option>

<option>Texas</option>

<option>Arkansas</option>

<option>Iowa</option>

<option>Illinois</option>

</select>

<hr>

<h3>Subscription</h3>

<select>

<option>Start Free Trial</option>

<option>Compass Pro Monthly</option>

<option>Compass Enterprise</option>

</select>

<br><br>

<button
type="button"
class="btn primary"
onclick="window.location='dashboard.html'">

Continue to Dashboard

</button>

</form>

</div>

<script src="../script.js"></script>

</body>
</html>
