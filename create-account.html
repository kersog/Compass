<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Compass</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="welcome-screen">

<div class="welcome-card">

<img src="kersog-emblem.svg" class="emblem" alt="KERSOG">

<h1>Create Your Compass Account</h1>

<p class="subtitle">
Create your account to begin managing inspections, claims, and estimates.
</p>

<form class="form-card">

<h2>Personal Information</h2>

<input type="text" placeholder="First Name">

<input type="text" placeholder="Last Name">

<input type="email" placeholder="Email Address">

<input type="tel" placeholder="Mobile Phone">


<h2>Company Information</h2>

<input type="text" placeholder="Company Name">

<select>
<option>Your Role</option>
<option>Owner</option>
<option>Sales Representative</option>
<option>Project Manager</option>
<option>Estimator</option>
<option>Insurance Adjuster</option>
<option>Other</option>
</select>

<input type="text" placeholder="City">

<select>
<option>Kansas</option>
<option>Oklahoma</option>
<option>Missouri</option>
<option>Colorado</option>
<option>Texas</option>
</select>


<h2>Security</h2>

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<label class="check">
<input type="checkbox">
I agree to the Terms of Service
</label>

<label class="check">
<input type="checkbox">
I agree to the Privacy Policy
</label>

<a href="company-setup.html" class="btn primary">
Create My Account
</a>

<a href="index.html" class="btn secondary">
Back
</a>

</form>

</div>

</div>

</body>
</html>
