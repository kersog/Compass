<script>
  let recognition;
  let isListening = false;
  let finalNotesBeforeListening = "";

  function toggleDictation() {
    const SpeechRecognition =
      window.SpeechRecognition || window.webkitSpeechRecognition;

    const button = document.getElementById("dictation-btn");
    const status = document.getElementById("dictation-status");
    const notes = document.getElementById("field-notes");

    if (!SpeechRecognition) {
      status.textContent =
        "Speech-to-text is not supported in this browser. Try Chrome or Edge.";
      return;
    }

    if (!recognition) {
      recognition = new SpeechRecognition();

      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = "en-US";

      recognition.onstart = function () {
        isListening = true;
        finalNotesBeforeListening = notes.value.trim();

        button.textContent = "Stop Dictation";
        status.textContent = "Listening...";
      };

      recognition.onresult = function (event) {
        let finalTranscript = "";
        let interimTranscript = "";

        for (let i = 0; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;

          if (event.results[i].isFinal) {
            finalTranscript += transcript + " ";
          } else {
            interimTranscript += transcript;
          }
        }

        let updatedNotes = finalNotesBeforeListening;

        if (finalTranscript.trim()) {
          updatedNotes +=
            (updatedNotes ? " " : "") + finalTranscript.trim();
        }

        if (interimTranscript.trim()) {
          updatedNotes +=
            (updatedNotes ? " " : "") +
            "[listening... " +
            interimTranscript.trim() +
            "]";
        }

        notes.value = updatedNotes.trim();
      };

      recognition.onerror = function (event) {
        isListening = false;
        button.textContent = "Start Dictation";

        if (event.error === "not-allowed") {
          status.textContent = "Microphone permission was denied.";
        } else if (event.error === "no-speech") {
          status.textContent = "No speech was detected.";
        } else {
          status.textContent = "There was a problem with speech capture.";
        }
      };

      recognition.onend = function () {
        isListening = false;
        button.textContent = "Start Dictation";
        status.textContent = "Tap to speak notes.";

        notes.value = notes.value
          .replace(/\s*\[listening\.\.\..*?\]$/i, "")
          .trim();
      };
    }

    if (isListening) {
      recognition.stop();
    } else {
      recognition.start();
    }
  }
</script>
