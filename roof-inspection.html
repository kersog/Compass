<body>
  <main class="app-shell">
    <header class="top-bar">
      <a href="../index.html"><img src="../assets/images/kersog-emblem.svg" alt="KERSOG emblem" /></a>
      <div>
        <h1>Inspection</h1>
        <p>Walk the roof with a guided workflow.</p>
      </div>
      <button class="icon-btn" onclick="fakeAction('Settings will be connected later.')">☰</button>

    <section class="page-title">
  <h2>Roof inspection</h2>
  <p>Designed for a salesperson standing at the property.</p>
</section>

<section class="card">
  <h3>Inspection progress</h3>
  <div class="progress"><div style="width: 38%"></div></div>
</section>

<section class="grid-actions">
  <button class="action-tile" onclick="location.href='photos.html'"><strong>Photos</strong><span>Capture damage and elevations.</span></button>
  <button class="action-tile" onclick="fakeAction('Roof diagram view will connect to Bob’s geometry engine later.')"><strong>Roof Diagram</strong><span>Facet view, markers, and repair zones.</span></button>
  <button class="action-tile" onclick="fakeAction('Repair event workflow coming next.')"><strong>Repair Events</strong><span>Confirm valleys, transitions, fixtures, and damage.</span></button>
  <button class="action-tile" onclick="fakeAction('Scope builder will connect later.')"><strong>Scope Notes</strong><span>Build documentation as you walk.</span></button>
</section>

<section class="card">
  <h3>Field notes</h3>
  <textarea placeholder="Add notes about damage, access, steepness, materials, or special conditions."></textarea>
</section>
