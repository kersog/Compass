<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspection | Compass</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="welcome-screen">
    <div class="welcome-card">

      <div class="brand-name">COMPASS</div>

      <h1>Inspection</h1>

      <p class="subtitle">Walk the roof with a guided workflow.</p>

      <div class="form-card">

        <div class="inspection-header">
          <div class="job-summary-card">
            <h2>Roof Inspection</h2>
            <p>Designed for a salesperson standing at the property.</p>
            <span class="status-pill">Inspection In Progress</span>
          </div>

          <div class="inspection-progress">
            <h3>Inspection Progress</h3>
            <div class="progress-bar">
              <div style="width: 38%;"></div>
            </div>
            <p>38% complete</p>
          </div>
        </div>

        <div class="diagram-placeholder">
          <div>
            <strong>Inspection Workflow</strong>
            <p>Move through each step to document the roof clearly and completely.</p>
          </div>
        </div>

        <div class="slope-grid" style="margin-top: 24px;">
          <button type="button" class="secondary-button" onclick="window.location.href='photos.html'">
            Photos
          </button>

          <button type="button" class="secondary-button" onclick="alert('Roof diagram view will connect later.')">
            Roof Diagram
          </button>

          <button type="button" class="secondary-button" onclick="alert('Repair event workflow coming next.')">
            Repair Events
          </button>

          <button type="button" class="secondary-button" onclick="alert('Scope notes builder will connect later.')">
            Scope Notes
          </button>
        </div>

        <div class="damage-card">
          <h3>Field Notes</h3>
          <textarea placeholder="Add notes about damage, access, steepness, materials, or special conditions."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="secondary-button" onclick="window.location.href='new-claim.html'">
            Back to Job
          </button>

          <button type="button" class="primary-button" onclick="window.location.href='reports.html'">
            Continue to Reports
          </button>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
